<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071025"/>
      <stop offset="0.55" stop-color="#0B1B3D"/>
      <stop offset="1" stop-color="#0A2A4A"/>
    </linearGradient>

    <radialGradient id="glow" cx="40%" cy="35%" r="70%">
      <stop offset="0" stop-color="#00D5FF" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#2B6CFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00D5FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#glow)"/>

  <!-- Diagonal accent lines -->
  <g opacity="0.18">
    <path d="M96 360 L360 96" stroke="#00D5FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M132 404 L404 132" stroke="#2B6CFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M108 412 L412 108" stroke="#41FFB3" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Top sheen -->
  <path d="M96 120
           C160 70, 260 56, 352 70
           C420 80, 448 120, 448 120
           L448 136
           C448 136, 404 110, 340 100
           C250 86, 160 100, 96 150 Z"
        fill="url(#sheen)"/>
</svg>
